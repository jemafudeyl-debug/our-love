<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love World | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🌟 Animations & CSS (ስራ ላይ ያሉትን የ CSS ክፍሎች እንዳሉ ተጠቀም) */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #070f1e; color: #ffffff; }
        .hero { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; }
        .main-content { max-width: 800px; margin: 40px auto; padding: 20px; }
        .form-section { background: #0f172a; padding: 30px; border-radius: 16px; margin-bottom: 40px; }
        textarea { width: 100%; height: 100px; background: #1e293b; color: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        button.submit-btn { background-color: #ff4d6d; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; }
        .note-card { background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #ff4d6d; }
    </style>
</head>
<body>
    <div class="hero">
        <video autoplay loop muted playsinline class="hero-video"><source src="love-video.mp4" type="video/mp4"></video>
        <h1>Welcome to Our Beautiful Journey</h1>
    </div>
    <div class="main-content">
        <div class="form-section">
            <h2>✍️ Save a Memory</h2>
            <textarea id="loveMessage" placeholder="Write today's memory..."></textarea>
            <button class="submit-btn" onclick="saveMemory()">Record Memory</button>
        </div>
        <div id="memoryContainer"></div>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = "https://nydtnemckzvsdsgnpjde.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3O-8eQBB9BT9hRc9TEJcBg_OBGpNvA3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveMemory() {
            let text = document.getElementById("loveMessage").value;
            if(!text.trim()) return alert("Please write something!");

            const { error } = await supabase.from('memories').insert([
                { message: text, time: new Date().toLocaleDateString() }
            ]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Saved successfully!");
                document.getElementById("loveMessage").value = "";
                loadMemories();
            }
        }

        async function loadMemories() {
            const { data } = await supabase.from('memories').select('*').order('id', { ascending: false });
            const container = document.getElementById("memoryContainer");
            container.innerHTML = "";
            (data || []).forEach(item => {
                container.innerHTML += `<div class="note-card"><p>${item.message}</p><small>${item.time}</small></div>`;
            });
        }

        window.onload = loadMemories;
    </script>
</body>
</html>
